<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies!</title>
    <style>
      /* Part 3: Your styling goes here */

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(to bottom, #000000, #2c2c2c);
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      body > * {
        width: 100%;
      }

      #movies-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        max-width: 1200px;
        width: 100%;
      }

      article {
        background-color: #1c1c1c;
        border-radius: 12px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-height: 600px;
        justify-content: flex-start;
      }

      h1 {
        margin: 0 0 10px 0;
        font-size: 1.5em;
        color: #ffffff;
      }

      img {
        width: 180px;
        height: 270px;
        border-radius: 8px;
        margin-bottom: 10px;
        object-fit: cover;
        display: block;
      }

      p {
        margin: 4px 0;
        font-size: 0.95em;
        line-height: 1.4;
      }

      .genre {
        background-color: #444;
        color: #fff;
        padding: 2px 6px;
        margin-right: 4px;
        border-radius: 4px;
        font-size: 0.85em;
        display: inline-block;
      }

      strong {
        color: #ccc;
      }

      /* - Added styling for the new edit button to make it look clickable and consistent with dark theme */
      .edit-btn {
        margin-top: 15px;
        padding: 8px 16px;
        cursor: pointer;
        background-color: #444;
        color: white;
        border: 1px solid #666;
        border-radius: 4px;
        transition: background 0.3s;
      }
      .edit-btn:hover {
        background-color: #666;
      }
    </style>
    <script>
      function reverseString(s) {
        return s.split("").reverse().join("");
      }

      window.onload = function () {
        const xhr = new XMLHttpRequest();
        xhr.onload = function () {
          const bodyElement = document.querySelector("body");
          if (xhr.status == 200) {
            const movies = JSON.parse(xhr.responseText);

            // Container for the movie grid
            const container = document.createElement("div");
            container.id = "movies-container";
            bodyElement.append(container);

            movies.forEach((movie) => {
              const article = document.createElement("article");

              /* - Requirement 1.3 - Setting the movie's imdbID as the id attribute of the article element */
              article.id = movie.imdbID;

              const title = document.createElement("h1");
              title.textContent = movie.Title;
              article.append(title);

              const img = document.createElement("img");
              img.src = movie.Poster;
              img.alt = movie.Title + " poster";
              article.append(img);

              const info = document.createElement("p");
              info.innerHTML = `<strong>Released:</strong> ${movie.Released} | <strong>Runtime:</strong> ${movie.Runtime} min`;
              article.append(info);

              const genres = document.createElement("p");
              genres.innerHTML = "<strong>Genres:</strong> ";
              movie.Genres.forEach((g) => {
                const span = document.createElement("span");
                span.className = "genre";
                span.textContent = g;
                genres.append(span);
              });
              article.append(genres);

              const directors = document.createElement("p");
              directors.innerHTML =
                "<strong>Directors:</strong> " + movie.Directors.join(", ");
              article.append(directors);

              const writers = document.createElement("p");
              writers.innerHTML =
                "<strong>Writers:</strong> " + movie.Writers.join(", ");
              article.append(writers);

              const actors = document.createElement("p");
              actors.innerHTML =
                "<strong>Actors:</strong> " + movie.Actors.join(", ");
              article.append(actors);

              const plot = document.createElement("p");
              plot.innerHTML = `<strong>Plot:</strong> ${movie.Plot}`;
              article.append(plot);

              const ratings = document.createElement("p");
              ratings.innerHTML = `<strong>Metascore:</strong> ${movie.Metascore} | <strong>IMDB Rating:</strong> ${movie.imdbRating}`;
              article.append(ratings);

              /* - Requirement 1.3/2.2 - Creating an Edit button for each movie card */
              const editBtn = document.createElement("button");
              editBtn.className = "edit-btn";
              editBtn.textContent = "Edit";

              /* - Navigation logic - clicking redirect to edit.html with the specific imdbID as a URL parameter */
              editBtn.onclick = function () {
                location.href = "edit.html?imdbID=" + movie.imdbID;
              };
              article.append(editBtn);

              // ADD: append to container (NOT body)
              container.append(article);
            });
          } else {
            bodyElement.append(
              "Daten konnten nicht geladen werden, Status " +
                xhr.status +
                " - " +
                xhr.statusText,
            );
          }
        };
        xhr.open("GET", "/movies");
        xhr.send();
      };
    </script>
  </head>

  <body></body>
</html>
